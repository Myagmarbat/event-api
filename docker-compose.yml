services:
  api:
    image: ${IMAGE:?set IMAGE}
    container_name: event-api
    restart: always
    environment:
      APP_NAME: ${APP_NAME:-event-api}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DB_SSL_CA: ${DB_SSL_CA:-}
    ports:
      - "80:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
