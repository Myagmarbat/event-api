services:
  api:
    image: ${IMAGE:?set IMAGE in .env}
    container_name: event-api
    restart: always
    env_file:
      - .env
    ports:
      - "80:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
