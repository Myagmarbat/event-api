name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Write DO CA certificate
        env:
          DO_DB_CA_CERT: ${{ secrets.DO_DB_CA_CERT }}
        run: |
          echo "$DO_DB_CA_CERT" > /tmp/do-ca-cert.crt
          echo "DB_SSL_CA=/tmp/do-ca-cert.crt" >> $GITHUB_ENV
      - name: Run integration tests
        run: pytest tests/integration -v --tb=short --log-cli-level=INFO

  coverage:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Write DO CA certificate
        env:
          DO_DB_CA_CERT: ${{ secrets.DO_DB_CA_CERT }}
        run: |
          echo "$DO_DB_CA_CERT" > /tmp/do-ca-cert.crt
          echo "DB_SSL_CA=/tmp/do-ca-cert.crt" >> $GITHUB_ENV
      - name: Coverage check
        run: pytest tests/unit tests/integration -v --tb=short --log-cli-level=INFO --cov=app --cov-report=term-missing --cov-fail-under=78