name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_SHA: ${{ secrets.DOCR_REGISTRY }}/${{ github.event.repository.name }}:${{ github.sha }}
      IMAGE_LATEST: ${{ secrets.DOCR_REGISTRY }}/${{ github.event.repository.name }}:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Authenticate to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Build Docker image
        run: |
          docker build \
            -t "$IMAGE_SHA" \
            -t "$IMAGE_LATEST" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

  deploy-stage:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: stage
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app dir
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.APP_DIR }}"

      - name: Sync deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yml,deploy.sh
          target: ${{ secrets.APP_DIR }}

      - name: Deploy stage droplet
        uses: appleboy/ssh-action@v1.2.5
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DO_DB_CA_CERT: ${{ secrets.DO_DB_CA_CERT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: APP_DIR,DO_API_TOKEN,DATABASE_URL,DO_DB_CA_CERT
          script: |
            set -euo pipefail
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            chmod +x ./deploy.sh
            if [ -n "$DO_DB_CA_CERT" ]; then
              CA_FILE="$(mktemp)"
              printf '%s\n' "$DO_DB_CA_CERT" > "$CA_FILE"
              chmod 600 "$CA_FILE"
              DB_SSL_CA="$CA_FILE" APP_DIR="$APP_DIR" DO_API_TOKEN="$DO_API_TOKEN" DATABASE_URL="$DATABASE_URL" ./deploy.sh '${{ github.sha }}'
            else
              APP_DIR="$APP_DIR" DO_API_TOKEN="$DO_API_TOKEN" DATABASE_URL="$DATABASE_URL" ./deploy.sh '${{ github.sha }}'
            fi

  stage-integration-tests:
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: stage
    env:
      STAGE_BASE_URL: ${{ secrets.STAGE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run stage integration tests
        run: pytest tests/stage -v --tb=short

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, stage-integration-tests]
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare app dir
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.APP_DIR }}"

      - name: Sync deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yml,deploy.sh
          target: ${{ secrets.APP_DIR }}

      - name: Deploy production droplet
        uses: appleboy/ssh-action@v1.2.5
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DO_DB_CA_CERT: ${{ secrets.DO_DB_CA_CERT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: APP_DIR,DO_API_TOKEN,DATABASE_URL,DO_DB_CA_CERT
          script: |
            set -euo pipefail
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            chmod +x ./deploy.sh
            if [ -n "$DO_DB_CA_CERT" ]; then
              CA_FILE="$(mktemp)"
              printf '%s\n' "$DO_DB_CA_CERT" > "$CA_FILE"
              chmod 600 "$CA_FILE"
              DB_SSL_CA="$CA_FILE" APP_DIR="$APP_DIR" DO_API_TOKEN="$DO_API_TOKEN" DATABASE_URL="$DATABASE_URL" ./deploy.sh '${{ github.sha }}'
            else
              APP_DIR="$APP_DIR" DO_API_TOKEN="$DO_API_TOKEN" DATABASE_URL="$DATABASE_URL" ./deploy.sh '${{ github.sha }}'
            fi
